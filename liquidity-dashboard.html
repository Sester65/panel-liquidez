// HELPERS
// ============================================================
const last = a => a && a.length ? a[a.length-1] : null;
const mean = a => a.reduce((s,v)=>s+v,0)/a.length;
const pctile = (a,p) => { const s=[...a].sort((x,y)=>x-y); return s[Math.max(0,Math.floor(p/100*s.length)-1)]; };

function ma(series,n){
  return series.map((v,i)=>{
    const sl=series.slice(Math.max(0,i-n+1),i+1).filter(x=>x!=null);
    return sl.length ? +(mean(sl).toFixed(4)) : null;
  });
}

function getLight(gauge,val,history){
  if(val==null) return 'dim';
  const vals=history.filter(v=>v!=null);
  if(vals.length>=15){
    const p75=pctile(vals,75), p95=pctile(vals,95);
    if(val>=p95) return 'red';
    if(val>=p75) return 'amber';
    return 'green';
  }
  if(val>=gauge.redAbove) return 'red';
  if(val>=gauge.amberAbove) return 'amber';
  return 'green';
}

function mergeByDate(base,overlay){
  const map={};
  base.forEach(p=>{map[p.date]=p;});
  overlay.forEach(p=>{map[p.date]=p;});
  return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
}

// ============================================================
// SVG SPARKLINE (no JSX needed - plain SVG)
// ============================================================
function Sparkline({data,color,height=60,showZero=true}){
  if(!data||data.length<2) return null;
  const W=400, H=height;
  const vals=data.map(d=>d.spread!=null?d.spread:(d.v!=null?d.v:0));
  const ma5vals=ma(vals,5);
  const minV=Math.min(...vals,showZero?0:Infinity);
  const maxV=Math.max(...vals,showZero?0:-Infinity);
  const range=maxV-minV||0.01;
  const pad=4;
  const toX=i=>pad+(i/(vals.length-1||1))*(W-2*pad);
  const toY=v=>H-pad-((v-minV)/range)*(H-2*pad);
  const rawPath=vals.map((v,i)=>(i===0?'M':'L')+toX(i).toFixed(1)+','+toY(v).toFixed(1)).join(' ');
  const ma5Path=ma5vals.map((v,i)=>v!=null?(i===0?'M':'L')+toX(i).toFixed(1)+','+toY(v).toFixed(1):null).filter(Boolean).join(' ');
  const zeroY=toY(0).toFixed(1);
  return html`
    <svg viewBox="0 0 ${W} ${H}" style=${{width:'100%',height,display:'block'}}>
      ${showZero && html`<line x1=${pad} y1=${zeroY} x2=${W-pad} y2=${zeroY} stroke="rgba(255,255,255,0.12)" strokeDasharray="3 3"/>`}
      <path d=${rawPath} fill="none" stroke=${color+'55'} strokeWidth="1.2"/>
      <path d=${ma5Path} fill="none" stroke=${color} strokeWidth="2"/>
    </svg>`;
}

// ============================================================
// INTERACTIVE CHART
// ============================================================
function InteractiveChart({seriesArr,height=360}){
  const [hover,setHover]=useState(null);
  const [hiSeries,setHiSeries]=useState(null);
  const svgRef=useRef(null);
  if(!seriesArr||!seriesArr.length) return null;
  const allVals=seriesArr.flatMap(s=>s.data.map(p=>p.v!=null?p.v:0));
  const allDates=[...new Set(seriesArr.flatMap(s=>s.data.map(p=>p.d)))].sort();
  if(allDates.length<2) return null;
  const W=800,H=height,padL=44,padR=14,padT=12,padB=26;
  const cW=W-padL-padR, cH=H-padT-padB;
  const minV=Math.min(...allVals), maxV=Math.max(...allVals);
  const range=maxV-minV||0.01;
  const toX=i=>padL+(i/(allDates.length-1||1))*cW;
  const toY=v=>padT+cH-((v-minV)/range)*cH;
  const nTicks=6;
  const ticks=Array.from({length:nTicks},(_,i)=>+(minV+(i/(nTicks-1))*range).toFixed(2));
  const xStep=Math.ceil(allDates.length/8);
  const xLabels=allDates.filter((_,i)=>i===0||i===allDates.length-1||i%xStep===0);
  const paths=seriesArr.map(s=>{
    let d='';
    allDates.forEach((date,i)=>{
      const p=s.data.find(x=>x.d===date);
      if(!p) return;
      const prev=allDates.slice(0,i).reverse().some(dd=>s.data.find(x=>x.d===dd));
      d+=(d?'L':'M')+toX(i).toFixed(1)+','+toY(p.v).toFixed(1)+' ';
    });
    return {...s,pathD:d.trim()};
  });
  function onMouseMove(e){
    const svg=svgRef.current; if(!svg) return;
    const rect=svg.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width);
    if(mx<padL||mx>W-padR){setHover(null);return;}
    const idx=Math.round((mx-padL)/cW*(allDates.length-1));
    if(idx<0||idx>=allDates.length){setHover(null);return;}
    const vals=seriesArr.map(s=>{
      const p=s.data.find(x=>x.d===allDates[idx]);
      return {label:s.label,color:s.color,v:p?p.v:null};
    }).filter(v=>v.v!=null);
    setHover({x:toX(idx),idx,vals});
  }
  return html`
    <div>
      <div style=${{position:'relative'}}>
        <svg ref=${svgRef} viewBox="0 0 ${W} ${H}"
          style=${{width:'100%',height,display:'block',cursor:'crosshair'}}
          onMouseMove=${onMouseMove} onMouseLeave=${()=>setHover(null)}>
          ${ticks.map((t,i)=>html`
            <g key=${i}>
              <line x1=${padL} y1=${toY(t)} x2=${W-padR} y2=${toY(t)} stroke="rgba(255,255,255,0.04)"/>
              <text x=${padL-4} y=${toY(t)+4} fill="#e5e7eb" fontSize="9" fontFamily="monospace" textAnchor="end">${t}%</text>
            </g>`)}
          ${xLabels.map(d=>html`
            <text key=${d} x=${toX(allDates.indexOf(d))} y=${H-4} fill="#9ca3af" fontSize="9" fontFamily="monospace" textAnchor="middle">${d}</text>`)}
          ${paths.map(s=>html`

function GaugeCard({gauge,points,loading}){

  const ma5Last=last(ma5);

function AlertBanner({spreads}){

async function claudeProxyFetch(){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json',
              'anthropic-dangerous-direct-browser-access':'true',
              'x-api-key':window.__ANTHROPIC_KEY__||'',
              'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
      system:'JSON data API. Respond with valid JSON only.',
      messages:[{role:'user',content:'Return current spread values for liquidity dashboard. JSON only: {"asOf":"2026-03-18","effr_iorb":[{"d":"2026-03","v":-0.01}],"sofr_iorb":[{"d":"2026-03","v":-0.02}],"tgcr_iorb":[{"d":"2026-03","v":-0.04}],"cp_sofr":[{"d":"2026-03","v":0.36}],"euribor_estr":[{"d":"2026-03","v":0.25}],"stlfsi":[{"d":"2026-03","v":-0.04}]} Confirm or correct:'}]})
  });
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  const s=text.indexOf('{'),e=text.lastIndexOf('}');
  if(s===-1) throw new Error('No JSON');
  const parsed=JSON.parse(text.slice(s,e+1));
  const result={};
  ['effr_iorb','sofr_iorb','tgcr_iorb','cp_sofr','euribor_estr','stlfsi'].forEach(k=>{
    if(Array.isArray(parsed[k])) result[k]=parsed[k].map(p=>({date:p.d,spread:+p.v}));
  });
  return result;
}

                {data:RH.OBFR,color:'#d4a853',label:'OBFR',dashed:false},
              ]}/>
            </div>

            <!-- ECB Chart -->
            <div style=${{background:C.panel,border:'1px solid '+C.border,borderRadius:16,padding:'20px 20px 16px',marginBottom:18}}>
              <p style=${{color:'#e2c97e',fontSize:10,letterSpacing:1.5,textTransform:'uppercase',marginBottom:4}}>European Central Bank - Evolucion historica 2022-2026</p>
              <p style=${{color:C.muted,fontSize:9,marginBottom:14}}>Cursor sobre el grafico para valores exactos</p>
              <${InteractiveChart} height=${300} seriesArr=${[
                {data:RH.ECBMLF,color:'#b8881f',label:'Marginal Lending',dashed:true},
                {data:RH.ECBMRO,color:'#d4a853',label:'Main Refinancing',dashed:false},
                {data:RH.ECBDF,color:'#e2c97e',label:'Deposit Facility',dashed:false},
                {data:RH.ESTR,color:'#fbbf24',label:'ESTR',dashed:false},
              ]}/>
            </div>
          </div>`}

        <!-- TAB: GUIA -->
        ${tab==='guide' && html`
          <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:14}}>
            ${[
              {title:'Regla general',color:C.accent,items:['Usa MA(5d), nunca valores de un solo dia','Filtra turn-dates: fin de mes/trimestre crean picos espurios','Senal seria = nivel alto + persistencia + corroboracion multiple']},
              {title:'1. Interbancario EUR',color:'#e2c97e',items:['Equivalente moderno del FRA/OIS en euros','ECB: tipicamente -10/-16 bp en 2023 (negativo = normal)','Paso a positivo persistente = senal de estres bancario EUR']},
              {title:'2. Reservas USD',color:'#f97316',items:['Trilateral de presion: EFFR, SOFR y TGCR vs IORB','Verde: spreads bajos y estables','SOFR>IORB un dia NO es crisis -- necesita persistencia']},
              {title:'3. CP-OIS USD',color:'#ea580c',items:['Sustituto del LIBOR-OIS post-transicion de tasas','CP AA 3M - SOFR: coste funding bancario unsecured USD','Spike = estres de credito/liquidez bancario USD']},
              {title:'Reglas de decision',color:C.amber,items:['Nivel 1 (ambar aislado): ruido o estres localizado','Nivel 2 (rojo+ambar): reduce exposicion a apalancamiento','Nivel 3 (2+ rojos): dash-for-cash; actua sin esperar']},
              {title:'Fuentes de datos',color:'#d4a853',items:['FRED: EFFR IORB SOFR TGCRRATE BGCR OBFR DCPF3M','FRED: ECBESTRVOLWGTTRMDMNRT IR3TIB01EZM156N STLFSI4','FRED: ECBASSETSW RRPONTSYAWARD RESBALNS WCURCIR','BCE: BKN via data-api.ecb.europa.eu']},
            ].map(card=>html`
              <div key=${card.title} style=${{background:C.panel,border:'1px solid '+C.border,
                borderRadius:12,padding:'16px 18px',position:'relative',overflow:'hidden'}}>
                <div style=${{position:'absolute',top:0,left:0,right:0,height:2,
                  background:'linear-gradient(90deg,'+card.color+',transparent)'}}/>
                <h3 style=${{fontSize:12,color:card.color,letterSpacing:.5,fontWeight:700,marginBottom:10}}>${card.title}</h3>
                <ul style=${{listStyle:'none',display:'flex',flexDirection:'column',gap:6}}>
                  ${card.items.map((item,i)=>html`
                    <li key=${i} style=${{fontSize:11,color:C.muted,lineHeight:1.5,paddingLeft:12,position:'relative'}}>
                      <span style=${{position:'absolute',left:0,color:card.color}}>></span>${item}
                    </li>`)}
                </ul>
              </div>`)}
          </div>`}

        <!-- FOOTER -->
        <div style=${{marginTop:22,display:'flex',justifyContent:'space-between',flexWrap:'wrap',
          gap:6,borderTop:'1px solid '+C.border,paddingTop:12}}>
          <p style=${{color:'#6b7280',fontSize:10}}>FRED: EFFR IORB SOFR TGCRRATE BGCR OBFR DCPF3M ECBESTRVOLWGTTRMDMNRT STLFSI4 ECBASSETSW</p>
          <p style=${{color:'#6b7280',fontSize:10}}>BCE: BKN (billetes en circulacion)</p>
        </div>

      </div>
    </div>`;
}

// Mount
document.getElementById('loading').style.display='none';
document.getElementById('root').style.display='block';
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
